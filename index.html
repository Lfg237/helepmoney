<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Carte Premium 2026</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
overflow-x:hidden;
overflow-y:auto;
padding:20px;
color:white;
}

/* ===== FOND ===== */
.bg{position:fixed;inset:0;z-index:-5;}
.bubble{position:absolute;border-radius:50%;filter:blur(50px);opacity:0.6;animation:float 12s infinite linear;}
.b1{width:250px;height:250px;background:#ff6600;top:10%;left:5%;}
.b2{width:300px;height:300px;background:#00ffee;right:5%;top:30%;animation-duration:18s;}
.b3{width:200px;height:200px;background:#ff00cc;bottom:5%;left:30%;animation-duration:20s;}

@keyframes float{
0%{transform:translateY(0) rotate(0);}
50%{transform:translateY(-40px) rotate(180deg);}
100%{transform:translateY(0) rotate(360deg);}
}

/* ===== CARD ===== */
.card{
width:100%;
max-width:370px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
border-radius:30px;
padding:22px;
}

/* ===== TEXTES ===== */
.company{text-align:center;font-size:26px;font-weight:bold;text-transform:uppercase;}
.job{text-align:center;font-size:14px;color:#ddd;margin-bottom:15px;}

.avatar{width:110px;height:110px;margin:auto;border-radius:50%;overflow:hidden;margin-bottom:15px;}
.avatar img{width:100%;height:100%;object-fit:cover;}

.box{
background:rgba(255,255,255,0.06);
padding:14px;
border-radius:18px;
margin-bottom:12px;
display:flex;
align-items:center;
gap:12px;
}

.box img{width:28px;height:28px;border-radius:8px;}

.label{font-size:13px;color:#bbb;}
.value{font-weight:bold;font-size:15px;}

/* ===== SEARCH ===== */
.searchBox{
display:flex;
gap:10px;
padding:12px;
border-radius:18px;
background:rgba(255,255,255,0.12);
}

.searchBox input{
flex:1;
padding:10px;
border:none;
outline:none;
border-radius:10px;
background:rgba(0,0,0,0.3);
color:white;
}

.searchBtn{
width:50px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff6600,#ff00cc);
color:white;
cursor:pointer;
}

/* ===== BUTTON ===== */
.copyBtn{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff6600,#ff00cc);
color:white;
font-weight:bold;
cursor:pointer;
}

/* ===== TIMER ===== */
.timer{
margin-top:12px;
text-align:center;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.08);
}

.status{
margin-top:12px;
text-align:center;
padding:10px;
border-radius:12px;
}

/* ===== BANDE ANNONCE (OK) ===== */
.ads{
position:fixed;
bottom:0;
left:0;
width:100%;
background:linear-gradient(90deg,#000,#111,#000);
border-top:3px solid #ff6600;
z-index:9999;
height:55px;
display:flex;
align-items:center;
overflow:hidden;
padding:0;
}

.ads span{
display:inline-block;
white-space:nowrap;
font-weight:900;
font-size:18px;
color:#fff;
letter-spacing:1px;
padding-left:100%;
animation:scroll 25s linear infinite;
line-height:55px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

</style>
</head>

<body>

<div class="bg">
<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
</div>

<div class="card">

<div class="company" id="company"></div>
<div class="job" id="job"></div>

<div class="avatar">
<img id="avatar">
</div>

<div class="box">
<i class="fa-solid fa-user"></i>
<div>
<div class="label">PROPRIÉTAIRE</div>
<div class="value" id="owner"></div>
</div>
</div>

<div class="box" id="orangeBox">
<img id="orangeImg">
<div>
<div class="label">ORANGE MONEY</div>
<div class="value" id="orange"></div>
</div>
</div>

<div class="box" id="mtnBox">
<img id="mtnImg">
<div>
<div class="label">MTN MONEY</div>
<div class="value" id="mtn"></div>
</div>
</div>

<!-- SEARCH -->
<div class="searchBox">
<input id="searchInput" placeholder="🔎 recherche interne">
<button class="searchBtn" onclick="searchNow()">
<i class="fa fa-search"></i>
</button>
</div>

<!-- SHARE -->
<button class="copyBtn" onclick="shareNow()">
🔗 Partager cette carte de visite
</button>

<!-- TIMER -->
<div class="timer">
⏳ Expiration :
<span id="countdown"></span>
</div>

<div class="status" id="statusBox"></div>

</div>

<!-- BANDE ANNONCE -->
<div class="ads">
<span>
✨ ETS LESFACILITATEURS GROUPE • Carte digitale premium 2026 • WhatsApp : +237670035609 • Design moderne • Partage intelligent ✨
</span>
</div>

<script>

/* ===== DATA ===== */
const entreprise="ETS LESFACILITATEURS GROUPE";
const fonction="Solutions Digitales Premium";
const proprietaire="Michel Kono";

const orangeMoney="+237670035609";
const mtnMoney="+237651475255";

const photo="https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/InShot_20260515_231032533.jpg";
const orangeImage="https://raw.githubusercontent.com/Lfg237/image-lovestring/main/orange-money.jpg";
const mtnImage="https://raw.githubusercontent.com/Lfg237/image-lovestring/main/5-2.png";

/* ===== INIT ===== */
company.innerText=entreprise;
job.innerText=fonction;
owner.innerText=proprietaire;

orange.innerText=orangeMoney;
mtn.innerText=mtnMoney;

avatar.src=photo;
orangeImg.src=orangeImage;
mtnImg.src=mtnImage;

/* ===== SHARE FIXED ===== */
function createID(){
return Math.random().toString(36).substring(2,10).toUpperCase();
}

const userID=createID();

/* 🔥 lien corrigé */
const shareURL="https://helepmoney.vercel.app/?id="+userID;

function shareNow(){
navigator.clipboard.writeText(shareURL);
alert("Lien copié !");
}

/* ===== SEARCH ===== */
function searchNow(){
const q=document.getElementById("searchInput").value.toLowerCase();

const data=[
["orangeBox",orangeMoney],
["mtnBox",mtnMoney],
["company",entreprise],
["job",fonction],
["owner",proprietaire]
];

let found=false;

data.forEach(([id,text])=>{
let el=document.getElementById(id);
if(text.toLowerCase().includes(q)){
el.scrollIntoView({behavior:"smooth"});
el.style.background="rgba(255,102,0,0.4)";
found=true;
}else{
el.style.background="rgba(255,255,255,0.06)";
}
});

if(!found) alert("Aucun résultat");
}

/* ===== TIMER ===== */
const duration=(365*24*60*60*1000)+(60*60*1000);
const end=Date.now()+duration;

const countdown=document.getElementById("countdown");

setInterval(()=>{
const diff=end-Date.now();

if(diff<=0){
countdown.innerHTML="EXPIRÉ";
return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor((diff%86400000)/3600000);
const m=Math.floor((diff%3600000)/60000);
const s=Math.floor((diff%60000)/1000);

countdown.innerHTML=`${d}j ${h}h ${m}m ${s}s`;

},1000);

/* STATUS FIX */
document.getElementById("statusBox").innerText="🟢 CARTE ACTIVE";

</script>

</body>
</html>
