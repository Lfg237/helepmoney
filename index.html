<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Multi Cartes Premium 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#050816;
color:white;
padding:20px;
}

h2{
text-align:center;
margin-bottom:10px;
background:linear-gradient(45deg,#ff6600,#ff00cc,#00ffee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.banner{
position:relative;
display:flex;
align-items:center;
overflow:hidden;
white-space:nowrap;
margin-bottom:15px;
padding:10px;
background:linear-gradient(90deg,#ff6600,#ff00cc,#00ffee);
border-radius:12px;
}

.banner-track{
display:inline-block;
white-space:nowrap;
font-weight:bold;
padding-left:100%;
animation:scrollBanner 12s linear infinite;
}

@keyframes scrollBanner{
0%{transform:translateX(0%);}
100%{transform:translateX(-100%);}
}

.banner-home-btn{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
z-index:9999;
padding:6px 10px;
border-radius:10px;
background:white;
color:#111;
font-size:12px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
padding:18px;
}

.company{text-align:center;font-size:20px;font-weight:bold;}
.job{text-align:center;font-size:13px;color:#aaa;margin-bottom:10px;}

.box{
display:flex;
gap:10px;
align-items:center;
background:rgba(255,255,255,0.06);
padding:10px;
border-radius:12px;
margin-bottom:8px;
}

.box img{
width:28px;
height:28px;
border-radius:6px;
object-fit:cover;
}

.btn{
display:block;
margin-top:6px;
padding:7px;
font-size:12px;
border-radius:10px;
background:linear-gradient(45deg,#ff6600,#ff00cc);
color:white;
text-align:center;
cursor:pointer;
text-decoration:none;
}

.btn-helpmoney{
display:block;
margin-top:10px;
padding:12px;
border-radius:16px;
background:linear-gradient(135deg,#00e676,#00c853,#64dd17);
color:#000;
font-weight:bold;
cursor:pointer;
border:none;
}

.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
align-items:center;
justify-content:center;
z-index:99999;
}

.box-popup{
background:#111827;
padding:20px;
border-radius:14px;
width:90%;
max-width:380px;
}

.box-popup input{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:8px;
background:#0b1220;
color:white;
}

#benefList{
max-height:120px;
overflow:auto;
background:#0b1220;
border-radius:8px;
margin-bottom:10px;
}

.benef-item{
padding:6px;
border-bottom:1px solid #222;
cursor:pointer;
}

.benef-item:hover{
background:#1a1a1a;
}
</style>
</head>

<body>

<div class="banner">
<a class="banner-home-btn" href="https://lesfacilitateurs.vercel.app/" target="_blank">🏠 Accueil</a>
<div class="banner-track">
ETS LESFACILITATEURS GROUPE • LOOK ME • CARTES NUMÉRIQUES • FINTECH SYSTEM
</div>
</div>

<div id="list" class="grid"></div>

<!-- PIN -->

<h3>🔐 Code PIN</h3>

<button class="btn" onclick="validatePin()">Valider</button>
<button class="btn" onclick="closePin()">Retour</button>
</div>
</div>

<!-- HELP -->
<div id="helpPopup" class="popup">
<div class="box-popup">

<h3>💰 HelpMoney</h3>

<input id="searchBenef" placeholder="🔎 rechercher..." oninput="filterBenef()">
<div id="benefList"></div>

<div style="padding:10px;background:#00c853;color:black;border-radius:10px;font-weight:bold;margin-bottom:10px;">
SOLDE : <span id="hm_solde_top">0 FCFA</span>
</div>

<input id="hm_nom" placeholder="Bénéficiaire">
<input id="hm_montant" type="number" placeholder="Montant">

<button class="btn" onclick="processTransfer()">💸 Demande de crédit</button>
<button class="btn" onclick="closeHelp()">↩ Retour</button>

</div>

const UNLOCK_CODE = "233";

function getExpireDate(card){
const d = new Date(card.createdAt);
d.setFullYear(d.getFullYear()+1);
return d;
}

function isExpired(card){
return Date.now() >= getExpireDate(card).getTime();
}

function getRemaining(card){

const diff = getExpireDate(card).getTime() - Date.now();

if(diff <= 0){
return "🔒 EXPIRÉE";
}

const d = Math.floor(diff/86400000);
const h = Math.floor((diff%86400000)/3600000);
const m = Math.floor((diff%3600000)/60000);
const s = Math.floor((diff%60000)/1000);

return `⏳ ${d}j ${h}h ${m}m ${s}s`;
}
/* DATA */
const baseData=[
{

  }

function updateTimers(){

baseData.forEach(card=>{

const el =
document.getElementById("timer_"+card.id);

if(!el) return;

el.innerHTML = getRemaining(card);

});

}

setInterval(updateTimers,1000);
function renderDetail(card){

const list = document.getElementById("list");

list.innerHTML = `
<div class="card">

<img src="${card.photo}" style="
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:15px;
">

<div class="company">${card.entreprise}</div>

function copyLink(link){

if(navigator.clipboard){

navigator.clipboard.writeText(link)
.then(()=>{
alert("✅ Lien copié avec succès");
})
.catch(()=>{
fallbackCopy(link);
});

}else{
fallbackCopy(link);
}

}

function fallbackCopy(text){

const input = document.createElement("textarea");

input.value = text;
document.body.appendChild(input);

input.select();
document.execCommand("copy");

document.body.removeChild(input);

alert("✅ Lien copié avec succès");

}
/* HOME */
function renderHome(){
const list=document.getElementById("list");
list.innerHTML="";

baseData.forEach(c=>{
list.innerHTML+=`
<div class="card">
<img src="${c.photo}" style="

/* BALANCE SIMPLE (FIXÉ) */
function getBalance(){
return Number(localStorage.getItem("balance_"+selectedCard.id) || 0);
}

function setBalance(val){
localStorage.setItem("balance_"+selectedCard.id, val);
}

/* PIN */
function openHelpMoney(id){

selectedCard = baseData.find(c=>c.id===id);

if(isExpired(selectedCard)){

const code = prompt(
"⛔ Carte expirée\nCode de déblocage :"
);

if(code !== UNLOCK_CODE){
alert("❌ Code incorrect");
return;
}

alert("✅ Carte débloquée");
}

document.getElementById("pinPopup").style.display="flex";
}

function validatePin(){
const pin=document.getElementById("pinInput").value;

if(pin!==selectedCard.pin){
alert("❌ PIN incorrect");
return;
}

document.getElementById("pinPopup").style.display="none";
document.getElementById("helpPopup").style.display="flex";

document.getElementById("hm_solde_top").innerText =
getBalance()+" FCFA";
}

function closePin(){document.getElementById("pinPopup").style.display="none";}
function closeHelp(){document.getElementById("helpPopup").style.display="none";}

/* SEARCH */
function filterBenef(){
const q=document.getElementById("searchBenef").value.toLowerCase();
const box=document.getElementById("benefList");
box.innerHTML="";
if(q.length<1) return;

baseData.filter(c=>c.owner.toLowerCase().includes(q))
.forEach(c=>{
box.innerHTML+=`
<div class="benef-item" onclick="selectBenef('${c.id}')">
👤 ${c.owner}
</div>`;
});
}

function selectBenef(id){
selectedBeneficiary=baseData.find(c=>c.id===id);
document.getElementById("hm_nom").value=selectedBeneficiary.owner;
document.getElementById("benefList").innerHTML="";
}

/* EMAIL */
function processTransfer(){
const nom=document.getElementById("hm_nom").value;
const montant=document.getElementById("hm_montant").value;

if(!nom || !montant) return alert("❌ champs manquants");

window.location.href=
"mailto:konomichel2@gmail.com"
+"?subject=DEMANDE CREDIT"
+"&body=BENEFICIAIRE:"+nom
+"%0AMONTANT:"+montant
+"%0ACARTE:"+selectedCard.id;
}
/* ================= CREDIT / DEBIT SYSTEM ================= */

function getBalance(){
return Number(localStorage.getItem("balance_"+selectedCard.id) || 0);
}

function setBalance(val){
localStorage.setItem("balance_"+selectedCard.id, Number(val));
}

/* 💰 AJOUTER ARGENT */
function creditCard(id, montant){
let current = Number(localStorage.getItem("balance_"+id) || 0);
current += Number(montant);
localStorage.setItem("balance_"+id, current);
}

/* 💸 RETIRER ARGENT */
function debitCard(id, montant){
let current = Number(localStorage.getItem("balance_"+id) || 0);
current -= Number(montant);

if(current < 0) current = 0;

localStorage.setItem("balance_"+id, current);
}
/* INIT */
const id =
new URLSearchParams(window.location.search)
.get("id");

if(id){

const card =
baseData.find(c => c.id === id);

if(card){
renderDetail(card);
}else{
renderHome();
}

}else{
renderHome();
}

creditCard("card1",9000000000000);
