<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Multi Cartes Premium 2026</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#050816;
color:white;
padding:20px;
}

/* ===== TITRE ===== */
h2{
text-align:center;
margin-bottom:20px;
background:linear-gradient(45deg,#ff6600,#ff00cc,#00ffee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ===== SEARCH ===== */
.searchBox{
display:flex;
gap:10px;
margin-bottom:20px;
}

.searchBox input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
outline:none;
background:#111;
color:white;
}

.searchBox button{
padding:10px 14px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff6600,#ff00cc);
color:white;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
border-radius:30px;
padding:22px;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
width:200px;height:200px;
background:linear-gradient(45deg,#ff6600,#ff00cc);
border-radius:50%;
top:-80px;right:-60px;
filter:blur(60px);
opacity:0.4;
}

/* TEXT */
.company{text-align:center;font-size:22px;font-weight:bold;text-transform:uppercase;}
.job{text-align:center;font-size:14px;color:#ddd;margin-bottom:15px;}

.avatar{width:100px;height:100px;margin:auto;border-radius:50%;overflow:hidden;margin-bottom:15px;}
.avatar img{width:100%;height:100%;object-fit:cover;}

.box{
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:16px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:10px;
}

.box img{width:28px;height:28px;border-radius:8px;}

.value{font-weight:bold;font-size:14px;}
.label{font-size:12px;color:#bbb;}

/* BUTTONS */
.btn{
display:block;
margin-top:8px;
padding:10px;
border-radius:14px;
background:linear-gradient(45deg,#ff6600,#ff00cc);
color:white;
text-decoration:none;
text-align:center;
font-weight:bold;
}

/* TIMER */
.timer{
margin-top:10px;
text-align:center;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:14px;
font-size:13px;
color:#00ffee;
}
</style>
</head>

<body>

<h2>📇 MULTI CARTES PREMIUM 2026</h2>

<!-- SEARCH -->
<div class="searchBox">
<input id="search" placeholder="🔎 rechercher une carte...">
<button onclick="searchCards()"><i class="fa fa-search"></i></button>
</div>

<div class="grid" id="list"></div>

<script>

const baseData = [
{
id:"card1",
entreprise:"ETS LESFACILITATEURS GROUPE",
fonction:"Solutions Digitales Premium",
owner:"Michel Kono",
phone:"+237670035609",
whatsapp:"237670035609",
site:"https://helepmoney.vercel.app/",
photo:"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/InShot_20260515_231032533.jpg",
orange:"+237670035609",
mtn:"+237651475255",
orangeImg:"https://raw.githubusercontent.com/Lfg237/image-lovestring/main/orange-money.jpg",
mtnImg:"https://raw.githubusercontent.com/Lfg237/image-lovestring/main/5-2.png"
},
{
id:"card2",
entreprise:"DIGITAL STUDIO PRO",
fonction:"Marketing Digital",
owner:"Sarah N",
phone:"+237650000001",
whatsapp:"237650000001",
site:"https://helepmoney.vercel.app/",
photo:"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/InShot_20260515_231032533.jpg",
orange:"+237650000001",
mtn:"+237651111111",
orangeImg:"https://raw.githubusercontent.com/Lfg237/image-lovestring/main/orange-money.jpg",
mtnImg:"https://raw.githubusercontent.com/Lfg237/image-lovestring/main/5-2.png"
},
{
id:"card3",
entreprise:"VISION TECH GROUP",
fonction:"IA & Dev",
owner:"John Doe",
phone:"+237652222222",
whatsapp:"237652222222",
site:"https://helepmoney.vercel.app/",
photo:"https://raw.githubusercontent.com/Lfg237/images-Lesfacilitateurs-/main/InShot_20260515_231032533.jpg",
orange:"+237652222222",
mtn:"+237653333333",
orangeImg:"https://raw.githubusercontent.com/Lfg237/image-lovestring/main/orange-money.jpg",
mtnImg:"https://raw.githubusercontent.com/Lfg237/image-lovestring/main/5-2.png"
}
];

const list = document.getElementById("list");

const BASE_URL = window.location.origin + window.location.pathname;

/* ===== DURATION FIX ===== */
const isLeapYear = (new Date().getFullYear() % 4 === 0);
const durationHours = isLeapYear ? 8784 : 8760;
const duration = durationHours * 60 * 60 * 1000;

/* ===== RENDER ===== */
function render(data){

list.innerHTML = "";

data.forEach(c=>{

const url = BASE_URL + "?id=" + c.id;

let start = localStorage.getItem("start_"+c.id);
if(!start){
start = Date.now();
localStorage.setItem("start_"+c.id,start);
}

const end = parseInt(start) + duration;

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="company">${c.entreprise}</div>
<div class="job">${c.fonction}</div>

<div class="avatar"><img src="${c.photo}"></div>

<div class="box"><i class="fa fa-user"></i>
<div><div class="label">PROPRIÉTAIRE</div>
<div class="value">${c.owner}</div></div></div>

<div class="box"><img src="${c.orangeImg}">
<div><div class="label">ORANGE MONEY</div>
<div class="value">${c.orange}</div></div></div>

<div class="box"><img src="${c.mtnImg}">
<div><div class="label">MTN MONEY</div>
<div class="value">${c.mtn}</div></div></div>

<a class="btn" href="${c.site}" target="_blank">🌐 Site</a>
<a class="btn" href="tel:${c.phone}">📞 Appeler</a>
<a class="btn" href="https://wa.me/${c.whatsapp}" target="_blank">💬 WhatsApp</a>

<a class="btn" href="${url}">📂 Ouvrir carte</a>

<div class="timer" id="t_${c.id}">...</div>
`;

list.appendChild(card);
});
}

/* ===== TIMER UNIQUE (IMPORTANT FIX) ===== */
setInterval(()=>{

baseData.forEach(c=>{

const el = document.getElementById("t_"+c.id);
if(!el) return;

let start = localStorage.getItem("start_"+c.id);
if(!start){
start = Date.now();
localStorage.setItem("start_"+c.id,start);
}

const end = parseInt(start) + duration;

const diff = end - Date.now();

if(diff <= 0){
el.innerHTML = "🔒 EXPIRÉE";
return;
}

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);
const seconds = Math.floor((diff/1000)%60);

el.innerHTML = `⏳ ${days}j ${hours}h ${minutes}m ${seconds}s`;

});

},1000);

/* ===== SEARCH ===== */
function searchCards(){
const q = document.getElementById("search").value.toLowerCase();

const filtered = baseData.filter(c =>
c.entreprise.toLowerCase().includes(q) ||
c.owner.toLowerCase().includes(q) ||
c.phone.includes(q)
);

render(filtered);
}

/* ===== INIT ===== */
render(baseData);

/* ===== PAGE UNIQUE ===== */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
const c = baseData.find(x=>x.id===id);

if(c){
document.body.innerHTML = `
<div style="max-width:420px;margin:auto;color:white;text-align:center;font-family:Arial">

<h2>${c.entreprise}</h2>
<p>${c.fonction}</p>

<img src="${c.photo}" style="width:130px;border-radius:50%;margin:20px 0;">

<p>👤 ${c.owner}</p>
<p>📞 ${c.phone}</p>

<a href="tel:${c.phone}">Appeler</a><br>
<a href="https://wa.me/${c.whatsapp}">WhatsApp</a><br>

<button onclick="navigator.clipboard.writeText(window.location.href)">
🔗 Copier lien
</button>

</div>
`;
}
}
// ================= COPY LINK FIX =================
function copyLink(url){

// essai moderne
if (navigator.clipboard && window.isSecureContext) {
navigator.clipboard.writeText(url).then(() => {
alert("🔗 Lien copié !");
}).catch(() => fallbackCopy(url));
} else {
fallbackCopy(url);
}

}

// fallback universel (Android + anciens navigateurs)
function fallbackCopy(text){

const input = document.createElement("input");
input.value = text;
document.body.appendChild(input);
input.select();
document.execCommand("copy");
document.body.removeChild(input);

alert("🔗 Lien copié !");
}
</script>

</body>
</html>
