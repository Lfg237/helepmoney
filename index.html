<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Multi Cartes Premium 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#050816;
color:white;
padding:20px;
}

h2{
text-align:center;
margin-bottom:10px;
background:linear-gradient(45deg,#ff6600,#ff00cc,#00ffee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.banner{
position:relative;
display:flex;
align-items:center;
overflow:hidden;
white-space:nowrap;
margin-bottom:15px;
padding:10px;
background:linear-gradient(90deg,#ff6600,#ff00cc,#00ffee);
border-radius:12px;
}

.banner-track{
display:inline-block;
white-space:nowrap;
font-weight:bold;
padding-left:100%;
animation:scrollBanner 12s linear infinite;
}

@keyframes scrollBanner{
0%{transform:translateX(0%);}
100%{transform:translateX(-100%);}
}

.banner-home-btn{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
z-index:9999;
padding:6px 10px;
border-radius:10px;
background:white;
color:#111;
font-size:12px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
padding:18px;
}

.company{text-align:center;font-size:20px;font-weight:bold;}
.job{text-align:center;font-size:13px;color:#aaa;margin-bottom:10px;}

.box{
display:flex;
gap:10px;
align-items:center;
background:rgba(255,255,255,0.06);
padding:10px;
border-radius:12px;
margin-bottom:8px;
}

.box img{
width:28px;
height:28px;
border-radius:6px;
object-fit:cover;
}

.btn{
display:block;
margin-top:6px;
padding:7px;
font-size:12px;
border-radius:10px;
background:linear-gradient(45deg,#ff6600,#ff00cc);
color:white;
text-align:center;
cursor:pointer;
text-decoration:none;
}

.btn-helpmoney{
display:block;
margin-top:10px;
padding:12px;
border-radius:16px;
background:linear-gradient(135deg,#00e676,#00c853,#64dd17);
color:#000;
font-weight:bold;
cursor:pointer;
border:none;
}

.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
align-items:center;
justify-content:center;
z-index:99999;
}

.box-popup{
background:#111827;
padding:20px;
border-radius:14px;
width:90%;
max-width:380px;
}

.box-popup input{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:8px;
background:#0b1220;
color:white;
}

#benefList{
max-height:120px;
overflow:auto;
background:#0b1220;
border-radius:8px;
margin-bottom:10px;
}

.benef-item{
padding:6px;
border-bottom:1px solid #222;
cursor:pointer;
}

.benef-item:hover{
background:#1a1a1a;
}
.box img{
width:30px;
height:30px;
object-fit:contain;
background:white;
padding:2px;
border-radius:6px;
}
.logo-skeleton{
width:30px;
height:30px;
border-radius:6px;
background:linear-gradient(90deg,#1a1a1a,#2a2a2a,#1a1a1a);
background-size:200% 100%;
animation:loading 1.2s infinite linear;
}

@keyframes loading{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

.logo-fade{
opacity:0;
transform:scale(0.8);
animation:fadeInLogo 0.6s forwards;
}

@keyframes fadeInLogo{
to{
opacity:1;
transform:scale(1);
}
}
</style>
</head>

<body>

<h2>💥 LOOK ME 🌝 carte de visite numérique</h2>

<div class="banner">
<a class="banner-home-btn" href="https://lesfacilitateurs.vercel.app/" target="_blank">🏠 Accueil</a>
<a class="banner-home-btn" href="https://lesfacilitateurs.vercel.app/" target="_blank">🏠 Accueil</a>

<!-- 🔎 NOUVEAU -->
<button class="banner-home-btn"
style="left:90px;background:#00e5ff;color:#000;"
onclick="openSearch()">
🔎 Recherche
</button>
<div class="banner-track">
ETS LESFACILITATEURS GROUPE • LOOK ME • CARTES NUMÉRIQUES • FINTECH SYSTEM
</div>
</div>

<div id="list" class="grid"></div>
<!-- SEARCH HOME -->
<div id="homeSearchBox" style="display:none;position:relative;margin:10px 0;">
<input id="homeSearchInput" placeholder="🔎 taper un nom..." oninput="liveSearch(this.value,'homeResults')" style="width:100%;padding:10px;border-radius:10px;border:none;">
<div id="homeResults" style="background:#0b1220;border-radius:10px;max-height:200px;overflow:auto;"></div>
</div>

<!-- SEARCH HELPMONEY -->
<div id="helpSearchBox" style="display:none;position:relative;margin:10px 0;">
<input id="helpSearchInput" placeholder="🔎 rechercher bénéficiaire..." oninput="liveSearch(this.value,'helpResults')" style="width:100%;padding:10px;border-radius:10px;border:none;">
<div id="helpResults" style="background:#0b1220;border-radius:10px;max-height:200px;overflow:auto;"></div>
</div>

<!-- PIN -->
<div id="pinPopup" class="popup">
<div class="box-popup">
<h3>🔐 Code PIN</h3>
<input id="pinInput" type="password">
<button class="btn" onclick="validatePin()">Valider</button>
<button class="btn" onclick="closePin()">Retour</button>
</div>
</div>

<!-- HELP -->
<div id="helpPopup" class="popup">
<div class="box-popup">

<h3>💰 HelpMoney</h3>

<!-- 🔎 NOUVEAU -->

<input id="searchBenef" placeholder="🔎 rechercher..." oninput="filterBenef()">
<div id="benefList"></div>

<div style="padding:10px;background:#00c853;color:black;border-radius:10px;font-weight:bold;margin-bottom:10px;">
SOLDE : <span id="hm_solde_top">0 FCFA</span>
</div>

<input id="hm_nom" placeholder="Bénéficiaire">
<input id="hm_montant" type="number" placeholder="Montant">

<button class="btn" onclick="processTransfer()">💸 Demande de crédit</button>
<button class="btn" onclick="closeHelp()">↩ Retour</button>

</div>
</div>

<script>

const ORANGE_IMG = "https://raw.githubusercontent.com/Lfg237/image-lovestring/main/orange-money.jpg";
const MTN_IMG = "https://raw.githubusercontent.com/Lfg237/image-lovestring/main/5-2.png";

const baseData = [
  {
    id: "card1",
    pin: "2332",
    balance: 99999999999,
    createdAt: "2026-04-03",
    entreprise: "ETS LESFACILITATEURS GROUPE",
    fonction: "BTP / Développement web mobile / Community manager freelance / Solutions digitales premium",
    owner: "Michel Kono",
    phone: "+237670035609",
    whatsapp: "+237670035609",
    orange: "+237656050097",
    mtn: "+237651475255",
    photo: "https://raw.githubusercontent.com/Lfg237/image-lovestring/main/file_00000000064071f4b580ce298f56bf2e.png"
  },

  {
    id: "card2",
    pin: "2555",
    balance: 500000,
    createdAt: "2026-05-03",
    entreprise: "ETS LFG",
    fonction: "Hôtellerie & restauration / Service traiteur",
    owner: "Leukeu Mdjomo",
    phone: "+237673710461",
    whatsapp: "+237673710461",
    orange: "+237655050704",
    mtn: "+237673710461",
    photo: "https://raw.githubusercontent.com/Lfg237/image-qui-parle-religieux-/main/6ebed138bd64389b81efff39ef712d87.jpg"
  },

  {
    id: "card3",
    pin: "3691",
    balance: 10000,
    createdAt: "2026-05-03",
    entreprise: "ETS SIMO SARL",
    fonction: "Fossoyage / Creusage / Remblai & déblai / Piscine / Fosse septique / Puisard / Semelles / Biogaz",
    owner: "Simo Angel",
    phone: "+237678398736",
    whatsapp: "+237678398736",
    orange: "+237692185807",
    mtn: "+237678398736",
    photo: "https://raw.githubusercontent.com/Lfg237/image-lovestring/main/InShot_20260524_195443075.jpg"
  },

  {
    id: "card4",
    pin: "7410",
    balance: 5000,
    createdAt: "2026-05-03",
    entreprise: "ETS LM LUDOVIC MEYONG",
    fonction: "Décoration extérieure / Agronomie",
    owner: "Ludovic Meyong",
    phone: "+237692725931",
    whatsapp: "+237692725931",
    orange: "+237692725931",
    mtn: "+237000000000",
    photo: "https://raw.githubusercontent.com/Lfg237/image-lovestring/main/file_000000007654724694e7bd5e7bf525f1.png"
  }
];

/* INIT STORAGE */
/* INIT STORAGE */
baseData.forEach(c => {
  if (localStorage.getItem("balance_" + c.id) === null) {
    localStorage.setItem(
      "balance_" + c.id,
      Number(c.balance || 0)
    );
  }
});

/* BALANCE */
function getBalance(id){
  return Number(localStorage.getItem("balance_"+id) || 0);
}

function setBalance(id,val){
  localStorage.setItem("balance_"+id, Number(val));
}

/* HOME */

function renderHome(){
const list = document.getElementById("list");

if(!list){
console.error("❌ container #list introuvable");
return;
}

list.innerHTML = "";

/* sécurité */
if(!baseData || baseData.length === 0){
list.innerHTML = "<p>Aucune carte disponible</p>";
return;
}

baseData.forEach(c=>{
	baseData.forEach(card => {

if(localStorage.getItem("balance_"+card.id) === null){

localStorage.setItem(
"balance_"+card.id,
card.balance
);

}

});

const balance = Number(localStorage.getItem("balance_"+c.id) || c.balance || 0);

list.innerHTML += `
<div class="card">

<img src="${c.photo}" style="width:100%;height:160px;object-fit:cover;border-radius:15px;margin-bottom:10px;">

<div class="company">🏢 ${c.entreprise}</div>
<div class="job">📌 ${c.fonction}</div>

<div class="box">
<img src="${ORANGE_IMG}">
<div>${c.orange}</div>
</div>

<div class="box">
<img src="${MTN_IMG}">
<div>${c.mtn}</div>
</div>

<div class="box">
💰 ${balance.toLocaleString()} FCFA
</div>

<a class="btn" href="?id=${c.id}">📂 Ouvrir la carte</a>

<button class="btn-helpmoney" onclick="openHelpMoney('${c.id}')">
💰 HelpMoney
</button>

</div>
`;
});
}
window.onload = function(){
renderHome();
}
/* DETAIL */
function renderDetail(card){
  const list = document.getElementById("list");

  list.innerHTML = `
  <div class="card">

    <img src="${card.photo}" style="width:100%;height:160px;object-fit:cover;border-radius:15px;margin-bottom:10px;">
    <div class="company">🏢 ${card.entreprise}</div>
    <div class="job">📌 ${card.fonction}</div>

    <div class="box">👤 ${card.owner}</div>
    <div class="box">📞 ${card.phone}</div>

    <div class="box">
      💰 ${getBalance(card.id).toLocaleString()} FCFA
    </div>

    <a class="btn" href="tel:${card.phone}">📞 Appeler</a>

    <a class="btn" href="https://wa.me/${card.whatsapp.replace('+','')}" target="_blank">
      💬 WhatsApp
    </a>

    <button class="btn" onclick="location.href='?'">🏠 Retour</button>

  </div>
  `;
}

/* ROUTE */
const id = new URLSearchParams(window.location.search).get("id");

if(id){
  const card = baseData.find(c=>c.id===id);
  if(card) renderDetail(card);
  else renderHome();
}else{
  renderHome();
}
function openGlobalSearch(){

const q = prompt("🔎 Recherche universelle (nom, entreprise ou numéro) :");

if(!q) return;

const result = baseData.filter(c =>
  c.owner.toLowerCase().includes(q.toLowerCase()) ||
  c.entreprise.toLowerCase().includes(q.toLowerCase()) ||
  c.phone.includes(q)
);

if(result.length === 0){
  alert("❌ Aucun résultat trouvé");
  return;
}
let text = "🔎 RESULTATS :\n\n";

result.forEach(c=>{
  text +=
  "👤 " + c.owner + "\n" +
  "🏢 " + c.entreprise + "\n" +
  "📞 " + c.phone + "\n\n";
});

alert(text);
}
function toggleSearch(id){
const box = document.getElementById(id);
box.style.display = box.style.display === "none" ? "block" : "none";
}

function liveSearch(value, targetId){

const box = document.getElementById(targetId);
box.innerHTML = "";

if(value.length < 1) return;

const results = baseData.filter(c =>
c.owner.toLowerCase().includes(value.toLowerCase()) ||
c.entreprise.toLowerCase().includes(value.toLowerCase()) ||
c.phone.includes(value)
);

/* affichage progressif */
let i = 0;

function showNext(){
if(i >= results.length) return;

const c = results[i];

const div = document.createElement("div");
div.style.padding = "8px";
div.style.borderBottom = "1px solid #222";
div.style.cursor = "pointer";
div.innerHTML = `
👤 <b>${c.owner}</b><br>
🏢 ${c.entreprise}<br>
📞 ${c.phone}
`;

div.onclick = () => {
window.location.href = "?id=" + c.id;
};

box.appendChild(div);

i++;
setTimeout(showNext, 80); // 🔥 effet progressif
}

showNext();
}
function openSearch(){
document.getElementById("searchPopup").style.display="flex";
}

function closeSearch(){
document.getElementById("searchPopup").style.display="none";
document.getElementById("searchResults").innerHTML="";
document.getElementById("searchInput").value="";
}

/* RECHERCHE UNIVERSELLE */
function runSearch(value){

const box = document.getElementById("searchResults");
box.innerHTML="";

if(value.length < 1) return;

const results = baseData.filter(c =>
c.owner.toLowerCase().includes(value.toLowerCase()) ||
c.entreprise.toLowerCase().includes(value.toLowerCase()) ||
c.phone.includes(value)
);

/* affichage progressif */
let i = 0;

function show(){
if(i >= results.length) return;

const c = results[i];

const div = document.createElement("div");
div.style.padding="8px";
div.style.borderBottom="1px solid #222";
div.style.cursor="pointer";

div.innerHTML = `
👤 <b>${c.owner}</b><br>
🏢 ${c.entreprise}<br>
📞 ${c.phone}
`;

div.onclick = ()=>{
closeSearch();
window.location.href = "?id=" + c.id;
};

box.appendChild(div);
i++;
setTimeout(show, 70);
}

show();
}
function closeHelp(){
document.getElementById("helpPopup").style.display="none";
}

function openHelpMoney(id){

selectedCard = baseData.find(c=>c.id===id);

const balance =
Number(localStorage.getItem("balance_"+id) || selectedCard.balance || 0);

document.getElementById("hm_solde_top").innerText =
balance.toLocaleString() + " FCFA";

document.getElementById("helpPopup").style.display = "flex";
}

function filterBenef(){

const q = document.getElementById("searchBenef").value.toLowerCase().trim();
const box = document.getElementById("benefList");

box.innerHTML = "";

if(q.length === 0){
return;
}

baseData
.filter(c =>
c.owner.toLowerCase().includes(q) ||
c.entreprise.toLowerCase().includes(q)
)
.forEach(c => {

box.innerHTML += `
<div class="benef-item" onclick="selectBenef('${c.id}')">
👤 ${c.owner}<br>
🏢 ${c.entreprise}
</div>
`;

});

}
function selectBenef(id){

selectedBeneficiary =
baseData.find(c => c.id === id);

if(!selectedBeneficiary) return;

document.getElementById("hm_nom").value =
selectedBeneficiary.owner;

document.getElementById("benefList").innerHTML = "";

document.getElementById("searchBenef").value =
selectedBeneficiary.owner;

}
function validatePin(){

const pin = document.getElementById("pinInput").value;

if(pin !== selectedCard.pin){
alert("❌ PIN incorrect");
return;
}

document.getElementById("pinPopup").style.display="none";
document.getElementById("helpPopup").style.display="flex";

const balance =
Number(localStorage.getItem("balance_"+selectedCard.id) || selectedCard.balance || 0);

document.getElementById("hm_solde_top").innerText =
balance.toLocaleString() + " FCFA";
}
function processTransfer(){

const beneficiaire =
document.getElementById("hm_nom").value;

const montant =
document.getElementById("hm_montant").value;

if(!beneficiaire || !montant){
alert("❌ Champs manquants");
return;
}

const sujet =
"Depot de crédit HelpMoney";

const message =
`Bonjour,

Je souhaite effectuer un depot de crédit.

Dépositaire : ${selectedCard.owner}
Bénéficiaire : ${beneficiaire}
Montant : ${montant} FCFA

Entreprise : ${selectedCard.entreprise}

Merci.`;

window.location.href =
"mailto:contact@helepmoney.com?subject="
+ encodeURIComponent(sujet)
+ "&body="
+ encodeURIComponent(message);

}
</script>
<!-- POPUP RECHERCHE UNIVERSELLE -->
<div id="searchPopup" class="popup">
<div class="box-popup">

<h3>🔎 Recherche universelle</h3>

<input id="searchInput" placeholder="Nom / entreprise / téléphone..." oninput="runSearch(this.value)">

<div id="searchResults" style="margin-top:10px;max-height:200px;overflow:auto;background:#0b1220;border-radius:10px;"></div>

<button class="btn" onclick="closeSearch()">↩ Fermer</button>

</div>
</div>
</body>
</html>
